name: control-enforcement

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  control-enforcement:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Enforce worktree
        run: uv run python -m kernel.cli --repo-root "${{ github.workspace }}" enforce-worktree --project-id session-memory --workspace-root "${{ github.workspace }}"

      - name: Audit control state
        run: uv run python -m kernel.cli --repo-root "${{ github.workspace }}" audit-control-state --project-id session-memory

      - name: Audit product docs
        run: uv run python -m kernel.cli --repo-root "${{ github.workspace }}" audit-product-docs

      - name: Run repo acceptance smoke
        run: uv run python scripts/smoke_repo_acceptance.py
